version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: echomood-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./ai-models
      dockerfile: Dockerfile
    container_name: echomood-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/echomood_db
    depends_on:
      - mongodb
    volumes:
      - backend_data:/app/echomood_db_data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass the host's backend URL to Vite during docker build.
        # Defaults to local loopback server. Override via .env or CLI.
        - VITE_API_BASE_URL=http://localhost:5000
    container_name: echomood-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_data:
